<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Smile School</title>
</head>
<body>
  <header>
    <div class="logo">SmileSchool</div>
    <nav>
      <a href="#">Courses</a>
      <a href="#">Pricing</a>
      <a href="#">Login</a>
    </nav>
  </header>
  <section class="hero">
    <h1>Get schooled</h1>
    <p>Smiles · Grin · Laugh</p>
    <button>Register for Free</button>
  </section>
  <section class="profiles">
    <h2>Learn from the pros</h2>
    <div class="profile">
      <div class="profile-card">
        <img src="path/to/image1.jpg" alt="Phillip Massey">
        <h3>Phillip Massey</h3>
        <p>Smile of the year 2018-2019</p>
      </div>
      <div class="profile-card">
        <img src="path/to/image2.jpg" alt="Nannie Lawrence">
        <h3>Nannie Lawrence</h3>
        <p>Best smile 2017</p>
      </div>
      <div class="profile-card">
        <img src="path/to/image3.jpg" alt="Bruce Walters">
        <h3>Bruce Walters</h3>
        <p>Best Friend Smile 2019</p>
      </div>
      <div class="profile-card">
        <img src="path/to/image4.jpg" alt="Henry Hughes">
        <h3>Henry Hughes</h3>
        <p>24h Smiles Winner 2016-2019</p>
      </div>
    </div>
  </section>
</body>
</html>
